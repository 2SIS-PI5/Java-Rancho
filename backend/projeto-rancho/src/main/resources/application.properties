spring.application.name=projeto-rancho

# ================================================================
# JWT
# Em producao: configure a variavel de ambiente JWT_SECRET
# Exemplo Render/Railway: JWT_SECRET=sua-chave-super-secreta-longa
# ================================================================
jwt.secret=${JWT_SECRET:RanchoComancheSecretKey2025SuperSegura!@#$%}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ================================================================
# E-mail (recuperacao de senha)
# Configure via env vars: MAIL_USERNAME, MAIL_PASSWORD
# ================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:seuemail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sua_senha_de_app_google}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.security.user.name=admin
spring.security.user.password=admin

# ================================================================
# Banco de dados
# DEV (padrao): H2 em arquivo local - persiste entre reinicializacoes
# PROD: defina DATABASE_URL para apontar para MySQL/PostgreSQL
#   Exemplo MySQL: jdbc:mysql://host:3306/rancho?useSSL=true
#   Exemplo Postgres: jdbc:postgresql://host:5432/rancho
# ================================================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./rancho-db}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update

# H2 Console (acesso via browser em /h2-console) - desabilite em producao
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ================================================================
# CORS - URL exata do frontend em producao
# Configure via env var: APP_FRONTEND_URL=https://usuario.github.io/RanchoApi
# ================================================================
app.frontend-url=${APP_FRONTEND_URL:}